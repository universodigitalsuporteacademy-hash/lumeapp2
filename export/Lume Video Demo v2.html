<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Lumé — Video Demo v2</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="animations.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: #EFE7DB; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'DM Sans', sans-serif; }
  #root { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Stage, Sprite, useTime, useSprite, Easing, interpolate, animate, clamp } = window;

const W = 390, H = 760, DUR = 32;

const easeOut = t => 1 - Math.pow(1 - t, 3);
const easeOutQ = t => 1 - Math.pow(1 - t, 4);
const easeBack = t => { const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); };
const lerp = (a,b,t) => a+(b-a)*t;
const spring = t => { const b=0.3; return Math.pow(2,-10*t)*Math.sin((t-b/4)*(2*Math.PI)/b)+1; };

// ─── Scene 1: Semana hook (0-5s) ───────────────────────
function SceneHook() {
  const { localTime: t } = useSprite();
  const wkOp = clamp(t/0.8,0,1);
  const wkY = lerp(-20,0,easeOut(clamp(t/0.8,0,1)));
  const subOp = clamp((t-0.9)/0.6,0,1);
  // Question bubbles appearing
  const QUESTIONS = [
    {text:"¿Es normal este cansancio?",x:-20,delay:1.4,angle:-3},
    {text:"¿Puedo comer sushi?",x:30,delay:1.9,angle:2},
    {text:"¿Por qué me duele la espalda?",x:-30,delay:2.3,angle:-2},
    {text:"¿Es peligroso este síntoma?",x:20,delay:2.7,angle:1},
    {text:"¿Cuándo sentiré los primeros movimientos?",x:-15,delay:3.1,angle:-1},
  ];
  const chaos = clamp((t-1.2)/1.0,0,1);
  const fade = 1-clamp((t-3.8)/0.8,0,1);
  return (
    <div style={{position:'absolute',inset:0,background:'linear-gradient(165deg,#FBF3EB 0%,#F5E8D8 50%,#EFE0CA 100%)',overflow:'hidden'}}>
      {/* Subtle texture overlay */}
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 50% 20%,rgba(168,73,42,.04) 0%,transparent 60%)',pointerEvents:'none'}}/>

      {/* Week number - big and minimal */}
      <div style={{position:'absolute',top:0,left:0,right:0,bottom:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',opacity:fade}}>
        <div style={{opacity:wkOp,transform:`translateY(${wkY}px)`,textAlign:'center'}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:400,color:'#a08070',letterSpacing:'.2em',textTransform:'uppercase',marginBottom:8}}>Estás en la</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:140,fontWeight:500,color:'#3d1a0e',lineHeight:.9,letterSpacing:'-.04em'}}>12</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,color:'#A8492A',marginTop:6,fontStyle:'italic'}}>semana de embarazo.</div>
        </div>
        <div style={{opacity:subOp,marginTop:20,fontSize:16,color:'#8a6a5a',textAlign:'center',lineHeight:1.6,fontStyle:'italic'}}>
          Y tienes<br/>mil preguntas.
        </div>

        {/* Floating question bubbles */}
        {QUESTIONS.map((q,i) => {
          const appear = clamp((t-q.delay)/0.5,0,1);
          const drift = (t-q.delay)*8;
          return (
            <div key={i} style={{
              position:'absolute',
              top:`${20+i*14}%`,
              left:'50%',
              transform:`translate(calc(-50% + ${q.x+Math.sin(drift*0.1)*3}px), ${-50+Math.sin(drift*0.07+i)*4}px) rotate(${q.angle}deg)`,
              opacity: appear * chaos,
              background:'rgba(255,255,255,.85)',
              backdropFilter:'blur(8px)',
              border:'1px solid rgba(168,73,42,.15)',
              borderRadius:99,
              padding:'7px 14px',
              fontSize:11.5,
              fontWeight:500,
              color:'#5a3a2a',
              whiteSpace:'nowrap',
              boxShadow:'0 4px 16px rgba(168,73,42,.1)',
            }}>{q.text}</div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Scene 2: Lumé answer (4-9s) ───────────────────────
function SceneAnswer() {
  const { localTime: t } = useSprite();
  const logoScale = easeBack(clamp(t/0.9,0,1));
  const line1Op = clamp((t-0.8)/0.7,0,1);
  const line1Y = lerp(12,0,easeOut(clamp((t-0.8)/0.7,0,1)));
  const line2Op = clamp((t-1.5)/0.7,0,1);
  const line2Y = lerp(12,0,easeOut(clamp((t-1.5)/0.7,0,1)));
  const phoneAppear = easeOut(clamp((t-2.2)/0.9,0,1));
  const phoneSc = lerp(0.85,1,easeBack(clamp((t-2.2)/0.9,0,1)));
  const checkOp = clamp((t-3.2)/0.5,0,1);
  return (
    <div style={{position:'absolute',inset:0,background:'linear-gradient(165deg,#FBF3EB 0%,#F5E8D8 100%)',display:'flex',flexDirection:'column',alignItems:'center',overflow:'hidden'}}>
      {/* Calm BG orb */}
      <div style={{position:'absolute',top:'30%',left:'50%',transform:'translate(-50%,-50%)',width:360,height:360,borderRadius:'50%',background:'radial-gradient(circle,rgba(168,73,42,.06) 0%,transparent 70%)',pointerEvents:'none'}}/>

      <div style={{padding:'60px 36px 0',display:'flex',flexDirection:'column',alignItems:'center',textAlign:'center'}}>
        {/* Logo */}
        <div style={{transform:`scale(${logoScale})`,marginBottom:18,display:'flex',alignItems:'center',gap:10}}>
          <img src="uploads/logo-lume.png" style={{width:42,height:42,objectFit:'contain'}}/>
          <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:600,color:'#3d1a0e'}}>Lumé</span>
        </div>
        <div style={{opacity:line1Op,transform:`translateY(${line1Y}px)`,fontFamily:"'Cormorant Garamond',serif",fontSize:42,fontWeight:500,color:'#3d1a0e',lineHeight:1.1}}>
          tiene todas
        </div>
        <div style={{opacity:line2Op,transform:`translateY(${line2Y}px)`,fontFamily:"'Cormorant Garamond',serif",fontSize:42,fontWeight:500,fontStyle:'italic',color:'#A8492A',lineHeight:1.1,marginTop:4}}>
          las respuestas.
        </div>
      </div>

      {/* Phone with home screen */}
      <div style={{transform:`scale(${phoneSc}) translateY(${lerp(40,0,phoneAppear)}px)`,opacity:phoneAppear,marginTop:28,position:'relative',width:210,height:350,borderRadius:36,boxShadow:'0 32px 64px rgba(61,26,14,.2), 0 0 0 1.5px rgba(0,0,0,.12), inset 0 0 0 1px rgba(255,255,255,.6)',background:'#f9f1eb'}}>
        <div style={{position:'absolute',top:7,left:'50%',transform:'translateX(-50%)',width:70,height:18,background:'#1a0a04',borderRadius:12,zIndex:10}}/>
        <div style={{position:'absolute',inset:0,borderRadius:34,overflow:'hidden',background:'linear-gradient(165deg,#f9f1eb,#efe7db)'}}>
          <div style={{height:32,display:'flex',alignItems:'flex-end',justifyContent:'space-between',padding:'0 16px 4px',fontSize:8.5,fontWeight:700,color:'#3d1a0e',background:'rgba(249,241,235,.9)'}}>
            <span>9:41</span><span>●●●●</span>
          </div>
          <div style={{padding:'6px 8px',display:'flex',flexDirection:'column',gap:6}}>
            <div style={{background:'linear-gradient(135deg,#3d1a0e,#8B3520)',borderRadius:12,padding:'10px 12px',color:'#fff',position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',top:-10,right:-8,width:50,height:50,borderRadius:'50%',background:'radial-gradient(circle,rgba(200,149,42,.3),transparent 70%)'}}/>
              <div style={{fontSize:6.5,fontWeight:800,letterSpacing:'.1em',color:'rgba(255,255,255,.5)',textTransform:'uppercase',marginBottom:2}}>SEMANA</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:30,fontWeight:700,lineHeight:1,color:'#fff'}}>12</div>
              <div style={{fontSize:7.5,color:'rgba(255,255,255,.6)',marginTop:1,fontStyle:'italic'}}>del tamaño de un limón</div>
              <div style={{height:2.5,borderRadius:99,background:'rgba(255,255,255,.15)',marginTop:6}}><div style={{height:'100%',width:'30%',borderRadius:99,background:'rgba(255,255,255,.8)'}}/></div>
            </div>
            {/* 3 feature mini-cards */}
            {[
              {svg:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,t:'Asistente IA',s:'Responde al instante',c:'#3A8070'},
              {svg:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/></svg>,t:'Síntomas',s:'Registro diario',c:'#8B5A9E'},
              {svg:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M12 2a5 5 0 0 1 5 5c0 5-5 9-5 9S7 12 7 7a5 5 0 0 1 5-5z"/></svg>,t:'Nutrición',s:'Plan personalizado',c:'#3A8050'},
            ].map(({svg,t:title,s,c},i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:7,background:'rgba(255,255,255,.68)',borderRadius:10,padding:'7px 9px',border:'1px solid rgba(255,255,255,.9)'}}>
                <div style={{color:c,flexShrink:0}}>{svg}</div>
                <div style={{flex:1}}><div style={{fontSize:8.5,fontWeight:700,color:'#3d1a0e'}}>{title}</div><div style={{fontSize:7,color:'#a08070'}}>{s}</div></div>
                <div style={{width:5,height:5,borderRadius:'50%',background:c}}/>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Check row */}
      <div style={{opacity:checkOp,marginTop:16,display:'flex',gap:16}}>
        {['Gratis para empezar','Español','Revisado por médicos'].map(l=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:4,fontSize:10.5,fontWeight:600,color:'#8a6a5a'}}>
            <div style={{width:14,height:14,borderRadius:'50%',background:'rgba(168,73,42,.12)',border:'1px solid rgba(168,73,42,.25)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="7" height="7" viewBox="0 0 24 24" fill="none" stroke="#A8492A" strokeWidth="3" strokeLinecap="round"><path d="M5 12l4 4L19 7"/></svg>
            </div>
            {l}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Scene 3: IA Feature (8.5-14s) ─────────────────────
function SceneIAv2() {
  const { localTime: t } = useSprite();
  const bgTrans = clamp(t/0.6,0,1);
  const phoneY = lerp(60,0,easeOut(clamp(t/0.9,0,1)));
  const fullQ = "¿Puedo comer sushi esta semana?";
  const qLen = Math.floor(lerp(0,fullQ.length,easeOut(clamp((t-0.5)/1.4,0,1))));
  const resp1 = clamp((t-2.2)/0.7,0,1);
  const resp2 = clamp((t-3.4)/0.7,0,1);
  const tagOp = clamp((t-4.4)/0.5,0,1);
  return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',background:`linear-gradient(165deg,rgba(10,32,48,${bgTrans}) 0%,rgba(26,64,80,${bgTrans}) 50%,rgba(46,104,88,${bgTrans}) 100%)`}}>
      {/* Cream layer fading out */}
      <div style={{position:'absolute',inset:0,background:'linear-gradient(165deg,#FBF3EB,#F5E8D8)',opacity:1-bgTrans,pointerEvents:'none'}}/>

      <div style={{position:'relative',zIndex:1,display:'flex',flexDirection:'column',alignItems:'center',height:'100%'}}>
        <div style={{textAlign:'center',padding:'52px 32px 0',opacity:clamp((t-0.2)/0.7,0,1)}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:40,fontWeight:500,color:'#fff',lineHeight:1.1}}>
            Respuestas reales,<br/><em style={{color:'#7ee8d4'}}>al instante.</em>
          </div>
          <div style={{fontSize:13,color:'rgba(255,255,255,.5)',marginTop:10}}>Sin buscar en Google.<br/>Sin miedo innecesario.</div>
        </div>

        {/* Full-width chat mockup (no phone bezel) */}
        <div style={{transform:`translateY(${phoneY}px)`,marginTop:28,width:300,background:'linear-gradient(180deg,rgba(13,26,36,.96),rgba(10,21,32,.98))',borderRadius:24,overflow:'hidden',boxShadow:'0 32px 64px rgba(0,0,0,.4)',border:'1px solid rgba(255,255,255,.08)'}}>
          {/* Chat header */}
          <div style={{padding:'14px 16px 10px',borderBottom:'1px solid rgba(255,255,255,.06)',display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:'linear-gradient(135deg,#3A8070,#4db6a0)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <img src="uploads/logo-lume.png" style={{width:20,height:20,objectFit:'contain'}}/>
            </div>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:'#fff'}}>Asistente Lumé</div>
              <div style={{fontSize:9,color:'rgba(77,182,160,.8)',fontWeight:600}}>● En línea</div>
            </div>
          </div>
          {/* Messages */}
          <div style={{padding:'12px 14px',display:'flex',flexDirection:'column',gap:10,minHeight:220}}>
            <div style={{background:'rgba(58,128,112,.25)',border:'1px solid rgba(58,128,112,.4)',borderRadius:'14px 14px 14px 3px',padding:'10px 13px',fontSize:12,color:'rgba(255,255,255,.9)',lineHeight:1.55,maxWidth:'85%'}}>
              {fullQ.slice(0,qLen)}{qLen<fullQ.length?<span style={{opacity:Math.sin(t*10)>0?1:0}}>|</span>:null}
            </div>
            <div style={{opacity:resp1,transform:`translateY(${lerp(8,0,easeOut(resp1))}px)`,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'14px 14px 3px 14px',padding:'10px 13px',fontSize:11.5,color:'rgba(255,255,255,.8)',lineHeight:1.6,alignSelf:'flex-end',maxWidth:'88%'}}>
              El sushi de pescado crudo no es recomendable por riesgo de listeria. Sin embargo, los rolls vegetales, de camarón cocido o ebi están totalmente bien.
            </div>
            <div style={{opacity:resp2,transform:`translateY(${lerp(8,0,easeOut(resp2))}px)`,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'14px 14px 3px 14px',padding:'10px 13px',fontSize:11.5,color:'rgba(255,255,255,.8)',lineHeight:1.6,alignSelf:'flex-end',maxWidth:'88%'}}>
              Todo verificado con tu semana 12. ¿Tienes otra duda?
            </div>
          </div>
          {/* Input */}
          <div style={{padding:'8px 14px 14px',borderTop:'1px solid rgba(255,255,255,.06)',display:'flex',gap:8,alignItems:'center'}}>
            <div style={{flex:1,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.12)',borderRadius:99,padding:'7px 12px',fontSize:10,color:'rgba(255,255,255,.3)'}}>Pregunta algo…</div>
            <div style={{width:28,height:28,borderRadius:'50%',background:'linear-gradient(135deg,#3A8070,#4db6a0)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </div>
          </div>
        </div>

        {/* Available 24/7 tag */}
        <div style={{opacity:tagOp,marginTop:18,display:'flex',alignItems:'center',gap:8,padding:'8px 18px',borderRadius:99,background:'rgba(77,182,160,.12)',border:'1px solid rgba(77,182,160,.3)'}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:'#7ee8d4',boxShadow:'0 0 8px #7ee8d4'}}/>
          <span style={{fontSize:12,fontWeight:600,color:'#7ee8d4'}}>Disponible las 24h · Los 7 días</span>
        </div>
      </div>
    </div>
  );
}

// ─── Scene 4: Features grid (13.5-20s) ──────────────────
function SceneFeatures() {
  const { localTime: t } = useSprite();
  const FEATURES = [
    {ic:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>,t:'Tracker semanal',d:'Semana a semana con tu bebé',c:'#A8492A',delay:0.3},
    {ic:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,t:'Asistente IA',d:'Respuestas sin espera',c:'#3A8070',delay:0.6},
    {ic:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"><path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/></svg>,t:'Síntomas',d:'Bitácora + orientación',c:'#8B5A9E',delay:0.9},
    {ic:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"><path d="M12 2a5 5 0 0 1 5 5c0 5-5 9-5 9S7 12 7 7a5 5 0 0 1 5-5z"/></svg>,t:'Nutrición',d:'Plan por IA personalizado',c:'#3A8050',delay:1.2},
    {ic:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"><path d="M20 12v10H4V12"/><rect x="2" y="7" width="20" height="5" rx="1"/><path d="M12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>,t:'Recompensas',d:'Puntos por cada hábito',c:'#C8961A',delay:1.5},
    {ic:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,t:'Expertas',d:'Matronas y ginecólogas',c:'#4A6A9E',delay:1.8},
  ];
  const headOp = clamp(t/0.7,0,1);
  const headY = lerp(-14,0,easeOut(clamp(t/0.7,0,1)));
  return (
    <div style={{position:'absolute',inset:0,background:'linear-gradient(165deg,#FBF3EB 0%,#F0E6D8 60%,#E8D8C8 100%)',overflow:'hidden',display:'flex',flexDirection:'column',alignItems:'center'}}>
      <div style={{position:'absolute',top:'40%',left:'50%',transform:'translate(-50%,-50%)',width:300,height:300,borderRadius:'50%',background:'radial-gradient(circle,rgba(168,73,42,.05) 0%,transparent 70%)',pointerEvents:'none'}}/>

      <div style={{textAlign:'center',padding:'44px 28px 0',opacity:headOp,transform:`translateY(${headY}px)`}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:36,fontWeight:500,color:'#3d1a0e',lineHeight:1.1}}>Todo lo que<br/><em style={{color:'#A8492A'}}>necesitas.</em></div>
        <div style={{fontSize:13.5,color:'#8a6a5a',marginTop:10}}>En una sola app. Para las 40 semanas.</div>
      </div>

      <div style={{marginTop:18,padding:'0 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,width:'100%'}}>
        {FEATURES.map(({ic,t:title,d,c,delay},i)=>{
          const appear = easeBack(clamp((t-delay)/0.55,0,1));
          return (
            <div key={i} style={{
              background:'rgba(255,255,255,.75)',
              backdropFilter:'blur(16px)',
              border:'1px solid rgba(255,255,255,.95)',
              borderRadius:16,
              padding:'12px 12px',
              boxShadow:'0 4px 20px rgba(61,26,14,.06), 0 1px 0 rgba(255,255,255,.9) inset',
              transform:`scale(${appear}) translateY(${lerp(16,0,easeOut(clamp((t-delay)/0.55,0,1)))}px)`,
              opacity:clamp((t-delay)/0.4,0,1),
            }}>
              <div style={{width:40,height:40,borderRadius:12,background:`${c}14`,border:`1.5px solid ${c}28`,display:'flex',alignItems:'center',justifyContent:'center',color:c,marginBottom:10}}>{ic}</div>
              <div style={{fontWeight:700,fontSize:13.5,color:'#3d1a0e',marginBottom:3}}>{title}</div>
              <div style={{fontSize:11,color:'#a08070',lineHeight:1.4}}>{d}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Scene 5: Social proof (19.5-25s) ───────────────────
function SceneSocial() {
  const { localTime: t } = useSprite();
  const appear = easeOut(clamp(t/0.8,0,1));
  const count = Math.floor(lerp(0, 3200, easeOut(clamp((t-0.5)/2.0,0,1))));
  const starsOp = clamp((t-0.3)/0.7,0,1);
  const review1Op = clamp((t-1.4)/0.6,0,1);
  const review2Op = clamp((t-2.2)/0.6,0,1);
  const review3Op = clamp((t-3.0)/0.6,0,1);
  const REVIEWS = [
    {name:'Ana García',wk:28,txt:'"Lumé me tranquilizó cada semana. El asistente me respondía a las 3 de la mañana sin juzgarme."',stars:5},
    {name:'Marta Ruiz',wk:15,txt:'"Por fin una app que parece hecha por alguien que ha estado embarazada de verdad."',stars:5},
    {name:'Laura M.',wk:36,txt:'"El tracker de síntomas me ayudó a llevar mis citas médicas mucho mejor."',stars:5},
  ];
  const ops = [review1Op,review2Op,review3Op];
  return (
    <div style={{position:'absolute',inset:0,background:'linear-gradient(165deg,#3d1a0e 0%,#5a2a14 40%,#8B3520 80%,#A8492A 100%)',overflow:'hidden',display:'flex',flexDirection:'column',alignItems:'center'}}>
      <div style={{position:'absolute',top:-60,left:-40,width:280,height:280,borderRadius:'50%',background:'radial-gradient(circle,rgba(230,207,161,.12),transparent 70%)'}}/>

      <div style={{textAlign:'center',padding:'52px 32px 0',opacity:appear}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:38,fontWeight:500,color:'#fff',lineHeight:1.1,marginBottom:6}}>
          Ellas ya<br/><em style={{color:'#E6CFA1'}}>confían en Lumé.</em>
        </div>
        {/* Stars + count */}
        <div style={{opacity:starsOp,display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginTop:14}}>
          <div style={{display:'flex',gap:3}}>
            {[1,2,3,4,5].map(i=><svg key={i} width="18" height="18" viewBox="0 0 24 24" fill="rgba(230,207,161,.9)" stroke="none"><path d="M12 3.5l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 17l-5.2 2.6 1-5.8L3.5 9.7l5.9-.9L12 3.5Z"/></svg>)}
          </div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,color:'#fff'}}>4.9</div>
          <div style={{fontSize:12,color:'rgba(255,255,255,.5)',fontWeight:500}}>({count.toLocaleString('es-ES')} mamás)</div>
        </div>
      </div>

      {/* Reviews */}
      <div style={{padding:'14px 16px 0',display:'flex',flexDirection:'column',gap:8,width:'100%'}}>
        {REVIEWS.map(({name,wk,txt,stars},i)=>(
          <div key={i} style={{opacity:ops[i],transform:`translateX(${lerp(-20,0,easeOut(ops[i]))}px)`,background:'rgba(255,255,255,.1)',backdropFilter:'blur(16px)',border:'1px solid rgba(255,255,255,.15)',borderRadius:18,padding:'14px 16px'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <div style={{width:34,height:34,borderRadius:'50%',background:`linear-gradient(135deg,rgba(168,73,42,.5),rgba(200,149,42,.4))`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <span style={{fontSize:13,fontWeight:700,color:'rgba(255,255,255,.9)'}}>{name[0]}</span>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,.9)'}}>{name}</div>
                <div style={{fontSize:10,color:'rgba(255,255,255,.45)'}}>Semana {wk}</div>
              </div>
              <div style={{display:'flex',gap:2}}>
                {[...Array(stars)].map((_,j)=><svg key={j} width="10" height="10" viewBox="0 0 24 24" fill="rgba(230,207,161,.9)" stroke="none"><path d="M12 3.5l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 17l-5.2 2.6 1-5.8L3.5 9.7l5.9-.9L12 3.5Z"/></svg>)}
              </div>
            </div>
            <div style={{fontSize:11.5,color:'rgba(255,255,255,.72)',lineHeight:1.55,fontStyle:'italic'}}>{txt}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Scene 6: CTA Close (24.5-32s) ──────────────────────
function SceneCTA() {
  const { localTime: t } = useSprite();
  const bgIn = clamp(t/1.0,0,1);
  const logoIn = easeBack(clamp((t-0.3)/0.9,0,1));
  const lineW = lerp(0,220,easeOut(clamp((t-0.8)/0.9,0,1)));
  const priceOp = clamp((t-1.4)/0.7,0,1);
  const priceY = lerp(10,0,easeOut(clamp((t-1.4)/0.7,0,1)));
  const ctaScale = easeBack(clamp((t-2.2)/0.8,0,1));
  const ctaOp = clamp((t-2.2)/0.6,0,1);
  const noteOp = clamp((t-3.2)/0.6,0,1);
  const btnPulse = 1 + Math.sin(Math.max(0,t-3)*2.5)*0.025;
  return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',background:`linear-gradient(165deg,rgba(251,243,235,${bgIn}) 0%,rgba(245,232,216,${bgIn}) 100%)`}}>
      <div style={{position:'absolute',inset:0,background:'linear-gradient(165deg,#3d1a0e,#5a2a14)',opacity:1-bgIn,pointerEvents:'none'}}/>
      <div style={{position:'absolute',top:'40%',left:'50%',transform:'translate(-50%,-50%)',width:360,height:360,borderRadius:'50%',background:`radial-gradient(circle,rgba(168,73,42,.07) 0%,transparent 70%)`,opacity:bgIn,pointerEvents:'none'}}/>

      <div style={{position:'relative',zIndex:1,display:'flex',flexDirection:'column',alignItems:'center',height:'100%',justifyContent:'center',padding:'0 36px'}}>
        {/* Logo */}
        <div style={{transform:`scale(${logoIn})`,display:'flex',flexDirection:'column',alignItems:'center',gap:10,marginBottom:16}}>
          <img src="uploads/logo-lume.png" style={{width:68,height:68,objectFit:'contain'}}/>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:48,fontWeight:500,color:'#3d1a0e',letterSpacing:'-.02em'}}>Lumé</div>
        </div>

        {/* Divider */}
        <div style={{height:1,background:'linear-gradient(90deg,transparent,rgba(168,73,42,.3),transparent)',width:lineW,marginBottom:20}}/>

        {/* Pricing */}
        <div style={{opacity:priceOp,transform:`translateY(${priceY}px)`,textAlign:'center',marginBottom:28}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:'#5a3a2a',fontStyle:'italic',marginBottom:6}}>Empieza gratis hoy.</div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            <div style={{padding:'5px 14px',borderRadius:99,background:'rgba(168,73,42,.08)',border:'1px solid rgba(168,73,42,.18)',fontSize:12,fontWeight:600,color:'#A8492A'}}>Plan Esencial · Gratis</div>
            <div style={{fontSize:12,color:'#a08070'}}>→</div>
            <div style={{padding:'5px 14px',borderRadius:99,background:'rgba(168,73,42,.08)',border:'1px solid rgba(168,73,42,.18)',fontSize:12,fontWeight:600,color:'#A8492A'}}>Bienestar · $9/mes</div>
          </div>
        </div>

        {/* CTA Button */}
        <div style={{opacity:ctaOp,transform:`scale(${ctaScale * btnPulse})`,width:'100%'}}>
          <div style={{padding:'18px',borderRadius:18,background:'linear-gradient(135deg,#c4693a,#A8492A)',boxShadow:'0 16px 40px rgba(168,73,42,.3), 0 1px 0 rgba(255,255,255,.2) inset',textAlign:'center',fontSize:18,fontWeight:700,color:'#fff',letterSpacing:'.01em',fontFamily:"'DM Sans',sans-serif"}}>
            Descarga Lumé gratis →
          </div>
        </div>

        {/* Note */}
        <div style={{opacity:noteOp,marginTop:14,fontSize:12.5,color:'#a08070',textAlign:'center',lineHeight:1.6}}>
          7 días de Bienestar gratis · Sin tarjeta<br/>iOS & Android · En español
        </div>

        {/* Bottom tagline */}
        <div style={{opacity:noteOp,marginTop:24,fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontStyle:'italic',color:'rgba(168,73,42,.6)',textAlign:'center'}}>
          Tu embarazo merece esta calma.
        </div>
      </div>
    </div>
  );
}

// ─── Main ───────────────────────────────────────────────
function LumeVideoV2() {
  return (
    <Stage width={W} height={H} duration={DUR} background="#FBF3EB" autoplay loop={false}>
      <Sprite start={0}    end={5.5}><SceneHook/></Sprite>
      <Sprite start={4.5}  end={9.5}><SceneAnswer/></Sprite>
      <Sprite start={8.5}  end={14.5}><SceneIAv2/></Sprite>
      <Sprite start={13.5} end={20.5}><SceneFeatures/></Sprite>
      <Sprite start={19.5} end={25.5}><SceneSocial/></Sprite>
      <Sprite start={24.5} end={32}><SceneCTA/></Sprite>
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LumeVideoV2/>);
</script>
